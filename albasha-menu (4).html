<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#111111"/>
<title>Al Basha Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --gold:#ffffff;--gold2:#cccccc;
  --bg:#111111;--bg2:#1a1a1a;--bg3:#222222;
  --text:#f0ead8;--muted:#888;--red:#e74c3c;
  --radius:16px;
}
body.light{--bg:#f5f5f5;--bg2:#ffffff;--bg3:#eeeeee;--text:#1a1a1a;--muted:#777;--gold:#111111;--gold2:#333333;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:64px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.2);flex-shrink:0;position:relative;z-index:100;}
.hlogo-wrap{display:flex;flex-direction:row;align-items:center;gap:10px;cursor:pointer;-webkit-user-select:none;user-select:none;}
.hlogo-img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.25);flex-shrink:0;background:#222;}
body.light .hlogo-img{border-color:rgba(0,0,0,.15);box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hlogo-text{display:flex;flex-direction:column;justify-content:center;}
.hlogo{font-family:'Playfair Display',serif;font-size:20px;color:#ffffff;letter-spacing:3px;}
body.light .hlogo{color:#1a1a1a;}
body.light .hlogo-ar{color:rgba(0,0,0,.45);}
.hlogo-ar{font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.45);letter-spacing:1px;}
.hright{display:flex;align-items:center;gap:8px;}

/* globe lang */
.glob-btn{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;padding:6px 13px;font-size:13px;cursor:pointer;border-radius:20px;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:5px;transition:.2s;}
.glob-btn:hover{background:rgba(255,255,255,.1);}
.lang-drop{display:none;position:absolute;top:calc(100% + 6px);right:16px;background:var(--bg2);border:1px solid #333;border-radius:12px;overflow:hidden;min-width:180px;z-index:400;box-shadow:0 12px 40px rgba(0,0,0,.7);}
.lang-drop.open{display:block;}
.lang-drop button{display:block;width:100%;padding:12px 18px;background:transparent;border:none;border-bottom:1px solid #2a2a2a;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;text-align:left;}
.lang-drop button:last-child{border-bottom:none;}
.lang-drop button:hover,.lang-drop button.cur{background:var(--bg3);color:#fff;}

/* theme + admin */
.theme-btn{background:var(--bg3);border:1px solid #333;font-size:17px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}


/* ── CATEGORY SCREEN ── */
#cat-screen{flex:1;overflow-y:auto;padding:16px;}
.cat-label{font-size:11px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;text-align:center;margin-bottom:14px;}
#cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.cat-card{background:var(--bg2);border-radius:var(--radius);padding:0;display:flex;flex-direction:column;align-items:stretch;cursor:pointer;transition:.15s;text-align:left;-webkit-user-select:none;position:relative;overflow:hidden;min-height:120px;border:1px solid #2a2a2a;}
.cat-card:active{transform:scale(.97);}
.cat-top-line{width:100%;height:80px;display:flex;align-items:center;padding:0 16px;}
.cat-top-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;line-height:1.2;text-shadow:0 1px 6px rgba(0,0,0,.4);}
.cat-em{display:none;}
.cat-name{display:none;}
.cat-count{font-size:10px;color:rgba(255,255,255,.45);padding:0 16px 14px;letter-spacing:2px;text-transform:uppercase;}
body.light .cat-card{border-color:#e0e0e0;}
body.light .cat-top-name{color:#fff;}
body.light .cat-count{color:rgba(255,255,255,.6);}

/* ── SLIDESHOW (fullscreen fixed) ── */
#sw{position:fixed;inset:0;background:#000;display:none;touch-action:pan-y;z-index:200;overflow:hidden;}
#sw.show{display:block;}
.slide{position:absolute;inset:0;opacity:0;transform:translateX(100%);transition:opacity .38s ease,transform .38s cubic-bezier(.25,.46,.45,.94);will-change:transform,opacity;}
.slide.active{opacity:1;transform:translateX(0);}
.slide.out-left{opacity:0;transform:translateX(-110%);}
.slide.out-right{opacity:0;transform:translateX(110%);}
.s-bg{position:absolute;inset:0;background:#1a1a1a;}
.s-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
.s-photo-ov{display:none;}
.s-emoji{position:absolute;top:80px;left:0;right:0;height:50%;display:flex;align-items:center;justify-content:center;font-size:110px;z-index:2;}
.s-ring{display:none;}
.s-overlay{position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(to top,rgba(0,0,0,.96) 0%,rgba(0,0,0,.75) 60%,transparent 100%);z-index:3;}
.s-info{position:absolute;bottom:0;left:0;right:0;padding:0 90px 20px 28px;z-index:4;}
.s-divider{display:none;}
.s-name{font-family:'Playfair Display',serif;font-size:28px;color:#ffffff;margin-bottom:2px;line-height:1.15;text-shadow:0 1px 8px rgba(0,0,0,.9);}
.s-native{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:8px;}
.s-desc{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:14px;line-height:1.5;max-width:460px;}
.s-price-row{display:flex;align-items:baseline;gap:6px;}
.s-price{font-family:'Playfair Display',serif;font-size:30px;color:#ffffff;font-weight:700;line-height:1;}
.s-price-lbl{font-size:13px;color:rgba(255,255,255,.7);letter-spacing:2px;text-transform:uppercase;}
.s-hint{display:none;}

/* dots */
#dots{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;pointer-events:none;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:.3s;flex-shrink:0;}
.dot.on{background:#fff;width:20px;border-radius:3px;}

/* counter */
#big-counter{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;z-index:50;letter-spacing:1px;}
body.light #big-counter{background:rgba(0,0,0,.7);color:#fff;}

/* ── BACK BAR (fixed, above everything) ── */
#slide-hdr{position:fixed;bottom:24px;right:24px;height:auto;width:auto;background:transparent;border:none;padding:0;display:none;align-items:center;z-index:9999;}
.back-btn{background:rgba(255,255,255,.95);border:none;color:#111;width:52px;height:52px;font-size:22px;font-weight:900;cursor:pointer;border-radius:50%;box-shadow:0 4px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;}
#slide-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);flex:1;}

/* ── PIN ── */
#pin-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:none;align-items:center;justify-content:center;}
#pin-ov.show{display:flex;}
.pin-box{background:var(--bg2);border:1px solid #2a2a2a;border-radius:12px;padding:36px;width:300px;text-align:center;}
.pin-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:6px;}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.pin-disp{font-size:34px;letter-spacing:14px;color:var(--text);height:46px;margin-bottom:20px;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pk{background:#0f0f0f;border:1px solid #2a2a2a;color:var(--text);font-size:20px;padding:14px;cursor:pointer;border-radius:6px;font-family:'Tajawal',sans-serif;}
.pk:hover{border-color:var(--gold);color:var(--gold);}
.pin-err{color:var(--red);font-size:13px;margin-top:10px;height:18px;}

/* ── ADMIN ── */
#adm-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:16px;}
#adm-ov.show{display:flex;}
#adm-panel{background:var(--bg2);border:1px solid #2a2a2a;border-radius:12px;width:100%;max-width:820px;}
.aph{background:var(--bg3);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222;border-radius:12px 12px 0 0;}
.apt{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.apc{background:transparent;border:1px solid #333;color:var(--muted);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:17px;}
.apc:hover{border-color:var(--red);color:var(--red);}
.ap-tabs{display:flex;border-bottom:1px solid #222;}
.ap-tab{padding:12px 18px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;border-bottom:2px solid transparent;}
.ap-tab.on{color:#fff;border-bottom-color:#fff;}
.apb{padding:20px;}
.fl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.fi{background:var(--bg);border:1px solid #2a2a2a;color:var(--text);padding:9px 12px;font-family:'Tajawal',sans-serif;font-size:14px;border-radius:6px;outline:none;width:100%;}
.fi:focus{border-color:var(--gold);}
.fs{background:var(--bg);border:1px solid #2a2a2a;color:var(--text);padding:9px 12px;font-family:'Tajawal',sans-serif;font-size:14px;border-radius:6px;outline:none;width:100%;}
.fr{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.fc{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.bg{background:#ffffff;color:#111;border:none;padding:9px 20px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border-radius:6px;}
.bo{background:transparent;color:var(--muted);border:1px solid #2a2a2a;padding:7px 12px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;border-radius:6px;}
.bo:hover{border-color:var(--gold);color:var(--gold);}
.bd{background:transparent;color:var(--red);border:1px solid var(--red);padding:7px 12px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;border-radius:6px;}
.bd:hover{background:var(--red);color:#fff;}
.st{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin:18px 0 10px;padding-bottom:7px;border-bottom:1px solid #1e1e1e;}
.item-card{background:var(--bg);border:1px solid #2a2a2a;border-radius:10px;padding:14px;margin-bottom:10px;}
.ic-top{display:flex;gap:12px;margin-bottom:12px;}
.ic-photo{width:80px;height:80px;min-width:80px;background:var(--bg3);border:1px dashed #444;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.ic-photo:hover{border-color:var(--gold);}
.ic-fields{flex:1;display:flex;flex-direction:column;gap:5px;}
.ic-langs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ic-actions{display:flex;gap:8px;}
.ord-btn{background:var(--bg3);border:1px solid #333;color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;}
.ord-btn:disabled{opacity:.25;cursor:not-allowed;}
.ord-btn:hover:not(:disabled){border-color:#fff;color:#fff;}
.ic-photo{position:relative;}

/* light mode extras */
body.light #hdr{background:#fff;border-bottom-color:rgba(0,0,0,.2);}
body.light .cat-card{background:#fff;border-color:#e0e0e0;}
body.light .cat-name{color:#111;}
body.light #cat-screen{background:#f4f4f4;}
body.light .s-bg{background:#222;}





body.light #slide-hdr{background:#fff;border-bottom-color:#e0e0e0;}
body.light #slide-title{color:#333;}
body.light .lang-drop{background:#fff;border-color:#ddd;box-shadow:0 8px 30px rgba(0,0,0,.1);}
body.light .lang-drop button{color:#111;border-bottom-color:#eee;}
body.light .lang-drop button:hover{background:#f5f5f5;}
body.light .pin-box,body.light #adm-panel{background:#fff;}
body.light .aph{background:#f4f4f4;}
body.light .fi,body.light .fs{background:#f9f9f9;color:#111;border-color:#ddd;}
body.light .item-card{background:#f9f9f9;border-color:#ddd;}
body.light .irn{color:#111;}

/* toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--gold);color:#000;padding:9px 22px;border-radius:6px;font-size:14px;font-weight:700;opacity:0;transition:.3s;z-index:1000;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

[dir="rtl"] .s-info{text-align:right;}
[dir="rtl"] .s-divider{margin-left:auto;}
[dir="rtl"] .lang-drop button{text-align:right;}
</style>
</head>

// ── SLIDES ────────────────────────────────────────
function loadSlides(cid){
  curIdx=0;
  const con=document.getElementById('slides-container');
  const dotsEl=document.getElementById('dots');
  const items=getItems(cid);
  const cat=DB.cats.find(c=>c.id===cid);
  const em=EMOJIS[cat?cat.n:'']||'🍽';
  con.innerHTML=''; dotsEl.innerHTML='';
  if(!items.length){
    con.innerHTML=`<div class="slide active" style="display:flex;align-items:center;justify-content:center;"><div class="s-bg"></div><div style="position:relative;z-index:3;color:var(--muted);">${UI[lang].empty}</div></div>`;
    document.getElementById('big-counter').textContent='';
    return;
  }
  items.forEach((item,i)=>{
    const sl=document.createElement('div');
    sl.className='slide'+(i===0?' active':'');
    const nat=getName(item);
    const pr=item.p>0?item.p.toLocaleString():'—';
    const prl=item.p>0?UI[lang].birr:'';
    const desc=item.desc||'';
    sl.innerHTML=`
      <div class="s-bg"></div>
      ${item.photo?`<img class="s-photo" src="${item.photo}"/>`:`<div class="s-emoji">${em}</div>`}
      <div class="s-overlay"></div>
      <div class="s-info">
        <div class="s-divider"></div>
        <div class="s-name">${item.n}</div>
        ${nat!==item.n?`<div class="s-native">${nat}</div>`:''}
        ${desc?`<div class="s-desc">${desc}</div>`:''}
        <div class="s-price-row">
          <div class="s-price">${pr}</div>
          ${prl?`<div class="s-price-lbl">${prl}</div>`:''}
        </div>
      </div>
      <div class="s-hint">swipe ›</div>`;
    con.appendChild(sl);
    const dot=document.createElement('div');
    dot.className='dot'+(i===0?' on':'');
    dotsEl.appendChild(dot);
  });
  updateCounter(items.length);
  initSwipe();
}

function updateCounter(total){
  if(total===undefined) total=curCat?getItems(curCat).length:0;
  const bc=document.getElementById('big-counter');
  if(bc) bc.textContent=total>0?`${curIdx+1} / ${total}`:'';
}

function goTo(n){
  if(!curCat) return;
  const items=getItems(curCat);
  const total=items.length;
  if(!total) return;
  const prev=curIdx;
  n=((n%total)+total)%total;
  if(n===prev) return;
  const slides=document.querySelectorAll('#slides-container .slide');
  const dots=document.querySelectorAll('#dots .dot');
  let goRight;
  if(prev===total-1&&n===0) goRight=true;
  else if(prev===0&&n===total-1) goRight=false;
  else goRight=(n>prev);
  slides[prev].classList.remove('active');
  slides[prev].classList.add(goRight?'out-left':'out-right');
  const ps=prev;
  setTimeout(()=>{if(slides[ps])slides[ps].classList.remove('out-left','out-right');},420);
  curIdx=n;
  const inc=slides[curIdx];
  inc.style.transition='none';
  inc.style.transform=goRight?'translateX(100%)':'translateX(-100%)';
  inc.style.opacity='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    inc.style.transition='';
    inc.classList.add('active');
    inc.style.transform='';
    inc.style.opacity='';
  }));
  dots.forEach((d,i)=>d.classList.toggle('on',i===curIdx));
  updateCounter(total);
}

// ── SWIPE ─────────────────────────────────────────
function initSwipe(){
  const el=document.getElementById('sw');
  // clone to remove old listeners
  const fresh=el.cloneNode(false);
  while(el.firstChild) fresh.appendChild(el.firstChild);
  el.parentNode.replaceChild(fresh,el);
  const sw=document.getElementById('sw');

  let sx=0,sy=0,stime=0,locked=null;

  sw.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
    stime=Date.now();
    locked=null;
  },{passive:true});

  sw.addEventListener('touchmove',e=>{
    if(locked===null){
      const dx=Math.abs(e.touches[0].clientX-sx);
      const dy=Math.abs(e.touches[0].clientY-sy);
      if(dx>dy&&dx>8){ locked='h'; e.preventDefault(); }
      else if(dy>dx&&dy>8){ locked='v'; }
    } else if(locked==='h'){
      e.preventDefault();
    }
  },{passive:false});

  sw.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    const dt=Date.now()-stime;
    const absDx=Math.abs(dx);
    const absDy=Math.abs(dy);

    if(locked==='h'){
      // horizontal swipe → next/prev item
      if(absDx>30||(absDx>15&&dt<250)){
        dx<0?goTo(curIdx+1):goTo(curIdx-1);
      }
    } else if(locked==='v'||locked===null){
      // vertical swipe up or down → go back
      if(absDy>60&&dt<500){
        goBack();
      }
    }
  },{passive:true});
}

    if(pinVal===PIN){closePin();openAdmin();}
    else{document.getElementById('pin-err').textContent='Wrong PIN';pinVal='';}
  } else {if(pinVal.length<4) pinVal+=k;}
  updPin();
}
function updPin(){document.getElementById('pin-disp').textContent='●'.repeat(pinVal.length)+'○'.repeat(4-pinVal.length);}

// ── ADMIN ─────────────────────────────────────────
function openAdmin(){document.getElementById('adm-ov').classList.add('show');apSec='items';renderAP();}
function closeAdmin(){document.getElementById('adm-ov').classList.remove('show');save();buildGrid();if(curCat)loadSlides(curCat);}
function aTab(s){
  apSec=s;
  document.querySelectorAll('.ap-tab').forEach((t,i)=>{const ss=['items','cats'];t.classList.toggle('on',ss[i]===s);});
  renderAP();
}
function renderAP(){const b=document.getElementById('apb');if(apSec==='items')rItems(b);else rCats(b);}

function rItems(b){
  const opts=DB.cats.map(c=>`<option value="${c.id}">${c.n}</option>`).join('');
  b.innerHTML=`
    <div class="adm-section">
      <div class="adm-section-title">➕ Add New Item</div>
      <div class="adm-form">
        <div class="adm-row">
          <div class="adm-field"><label>English Name</label><input class="fi" id="ni-n" placeholder="e.g. Beef Tibs"/></div>
          <div class="adm-field adm-sm"><label>Price (Birr)</label><input class="fi" id="ni-p" type="number" placeholder="0"/></div>
        </div>
        <div class="adm-row">
          <div class="adm-field"><label>Category</label><select class="fs" id="ni-c">${opts}</select></div>
          <div class="adm-field"><label>Description</label><input class="fi" id="ni-d" placeholder="Short description"/></div>
        </div>
        <div class="adm-lang-grid">
          <div class="adm-field"><label>🇪🇹 አማርኛ</label><input class="fi" id="ni-am" placeholder="Amharic"/></div>
          <div class="adm-field"><label>🇪🇹 Afaan Oromoo</label><input class="fi" id="ni-om" placeholder="Oromo"/></div>
          <div class="adm-field"><label>🇸🇦 العربية</label><input class="fi" id="ni-ar" placeholder="Arabic" dir="rtl"/></div>
          <div class="adm-field"><label>🇸🇴 Soomaali</label><input class="fi" id="ni-so" placeholder="Somali"/></div>
        </div>
        <button class="bg" onclick="addItem()">+ Add Item</button>
      </div>
    </div>
    <div class="adm-section">
      <div class="adm-section-title">All Items <span style="color:var(--muted);font-size:12px;">(${DB.items.length} total)</span></div>
      <div id="il"></div>
    </div>`;
  rIL();
}

function rIL(){
  const el=document.getElementById('il');if(!el)return;
  const total=DB.items.length;
  el.innerHTML=DB.items.map((item,idx)=>{
    const tr=DB.tr[item.id]||{};
    const catOpts=DB.cats.map(c=>`<option value="${c.id}"${c.id===item.c?' selected':''}>${c.n}</option>`).join('');
    return `<div class="adm-card">
      <div class="adm-card-header">
        <div class="adm-order-btns">
          <button class="ord-btn" onclick="moveItem(${idx},-1)" ${idx===0?'disabled':''}>▲</button>
          <span class="ord-num">${idx+1}</span>
          <button class="ord-btn" onclick="moveItem(${idx},1)" ${idx===total-1?'disabled':''}>▼</button>
        </div>
        <div class="adm-photo-box" onclick="triggerPhoto('${item.id}')">
          ${item.photo
            ? `<img src="${item.photo}" class="adm-photo-img"/>
               <button class="adm-photo-del" onclick="removePhoto('${item.id}');event.stopPropagation();">✕</button>`
            : `<div class="adm-photo-empty"><div>📷</div><div>Add Photo</div></div>`}
          <input type="file" accept="image/*" id="ph-${item.id}" style="display:none" onchange="uploadPhoto('${item.id}',this)"/>
        </div>
        <div class="adm-main-fields">
          <div class="adm-field"><label>English Name</label><input class="fi" id="en-${item.id}" value="${item.n}"/></div>
          <div class="adm-row">
            <div class="adm-field adm-sm"><label>Price (Birr)</label><input class="fi" id="pr-${item.id}" type="number" value="${item.p}"/></div>
            <div class="adm-field"><label>Category</label><select class="fs" id="ca-${item.id}">${catOpts}</select></div>
          </div>
          <div class="adm-field"><label>Description</label><input class="fi" id="de-${item.id}" value="${item.desc||''}" placeholder="Short description"/></div>
        </div>
      </div>
      <div class="adm-langs">
        <div class="adm-field"><label>🇪🇹 አማርኛ</label><input class="fi" id="am-${item.id}" value="${tr.am||''}"/></div>
        <div class="adm-field"><label>🇪🇹 Afaan Oromoo</label><input class="fi" id="om-${item.id}" value="${tr.om||''}"/></div>
        <div class="adm-field"><label>🇸🇦 العربية</label><input class="fi" id="ar-${item.id}" value="${tr.ar||''}" dir="rtl"/></div>
        <div class="adm-field"><label>🇸🇴 Soomaali</label><input class="fi" id="so-${item.id}" value="${tr.so||''}"/></div>
      </div>
      <div class="adm-card-actions">
        <button class="adm-save-btn" onclick="saveItem('${item.id}')">💾 Save</button>
        <button class="adm-del-btn" onclick="delItem('${item.id}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

function moveItem(idx,dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=DB.items.length)return;
  const tmp=DB.items[idx];
  DB.items[idx]=DB.items[newIdx];
  DB.items[newIdx]=tmp;
  save();rIL();
}

function removePhoto(id){
  const item=DB.items.find(i=>i.id===id);
  if(item){delete item.photo;save();rIL();toast('Photo removed');}
}

function triggerPhoto(id){document.getElementById('ph-'+id).click();}
function uploadPhoto(id,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=900;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const comp=cv.toDataURL('image/jpeg',.75);
      const item=DB.items.find(i=>i.id===id);
      if(item){item.photo=comp;try{save();rIL();toast('✅ Photo saved! ('+Math.round(comp.length/1024)+'KB)');}catch(e){toast('⚠️ Storage full!');}}
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}

function addItem(){
  const n=document.getElementById('ni-n').value.trim();
  const p=parseInt(document.getElementById('ni-p').value)||0;
  const c=document.getElementById('ni-c').value;
  const d=document.getElementById('ni-d').value.trim();
  const am=document.getElementById('ni-am').value.trim();
  const om=document.getElementById('ni-om').value.trim();
  const ar=document.getElementById('ni-ar').value.trim();
  const so=document.getElementById('ni-so').value.trim();
  if(!n){toast('Enter item name');return;}
  const id='i'+Date.now();
  DB.items.push({id,c,n,p,desc:d});
  if(am||om||ar||so) DB.tr[id]={am,om,ar,so};
  save();rIL();toast('Item added!');
  ['ni-n','ni-p','ni-d','ni-am','ni-om','ni-ar','ni-so'].forEach(x=>{const el=document.getElementById(x);if(el)el.value='';});
}

function saveItem(id){
  const item=DB.items.find(i=>i.id===id);if(!item)return;
  item.n=document.getElementById('en-'+id).value.trim()||item.n;
  item.p=parseInt(document.getElementById('pr-'+id).value)||0;
  item.c=document.getElementById('ca-'+id).value;
  item.desc=document.getElementById('de-'+id).value.trim();
  DB.tr[id]={
    am:document.getElementById('am-'+id).value.trim(),
    om:document.getElementById('om-'+id).value.trim(),
    ar:document.getElementById('ar-'+id).value.trim(),
    so:document.getElementById('so-'+id).value.trim()
  };
  save();toast('✅ Saved: '+item.n);
}

function delItem(id){
  if(!confirm('Delete this item?'))return;
  DB.items=DB.items.filter(i=>i.id!==id);
  delete DB.tr[id];
  save();rIL();toast('Deleted');
}

function rCats(b){
  b.innerHTML=`
    <div class="adm-section">
      <div class="adm-section-title">➕ Add Category</div>
      <div class="adm-form">
        <div class="adm-row">
          <div class="adm-field"><label>Category Name</label><input class="fi" id="nc-n" placeholder="e.g. Desserts"/></div>
        </div>
        <button class="bg" onclick="addCat()">+ Add Category</button>
      </div>
    </div>
    <div class="adm-section">
      <div class="adm-section-title">All Categories</div>
      <div id="cl"></div>
    </div>`;
  rCL();
}
function rCL(){
  const el=document.getElementById('cl');if(!el)return;
  const total=DB.cats.length;
  el.innerHTML=DB.cats.map((cat,idx)=>{
    const cnt=getItems(cat.id).length;
    return `<div class="adm-card">
      <div class="adm-card-header">
        <div class="adm-order-btns">
          <button class="ord-btn" onclick="moveCat(${idx},-1)" ${idx===0?'disabled':''}>▲</button>
          <span class="ord-num">${idx+1}</span>
          <button class="ord-btn" onclick="moveCat(${idx},1)" ${idx===total-1?'disabled':''}>▼</button>
        </div>
        <div class="adm-photo-box" onclick="triggerCatPhoto('${cat.id}')">
          ${cat.photo
            ? `<img src="${cat.photo}" class="adm-photo-img"/>
               <button class="adm-photo-del" onclick="removeCatPhoto('${cat.id}');event.stopPropagation();">✕</button>`
            : `<div class="adm-photo-empty"><div>📷</div><div>Photo</div></div>`}
          <input type="file" accept="image/*" id="cph-${cat.id}" style="display:none" onchange="uploadCatPhoto('${cat.id}',this)"/>
        </div>
        <div class="adm-main-fields" style="flex:1;">
          <div class="adm-field"><label>Category Name</label><input class="fi" id="cn-${cat.id}" value="${cat.n}"/></div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px;">${cnt} items inside</div>
        </div>
      </div>
      <div class="adm-card-actions">
        <button class="adm-save-btn" onclick="saveCat('${cat.id}')">💾 Save</button>
        <button class="adm-del-btn" onclick="delCat('${cat.id}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

function moveCat(idx,dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=DB.cats.length)return;
  const tmp=DB.cats[idx];
  DB.cats[idx]=DB.cats[newIdx];
  DB.cats[newIdx]=tmp;
  save();rCL();
}

function removeCatPhoto(id){
  const cat=DB.cats.find(c=>c.id===id);
  if(cat){delete cat.photo;save();rCL();toast('Photo removed');}
}

function triggerCatPhoto(id){document.getElementById('cph-'+id).click();}
function uploadCatPhoto(id,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=600;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const comp=cv.toDataURL('image/jpeg',.7);
      const cat=DB.cats.find(c=>c.id===id);
      if(cat){cat.photo=comp;try{save();rCL();toast('✅ Category photo saved!');}catch(e){toast('⚠️ Storage full!');}}
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}

function addCat(){
  const n=document.getElementById('nc-n').value.trim();
  if(!n){toast('Enter name');return;}
  DB.cats.push({id:'c'+Date.now(),n});
  save();rCL();toast('Category added!');
  document.getElementById('nc-n').value='';
}
function saveCat(id){
  const c=DB.cats.find(x=>x.id===id);if(!c)return;
  const n=document.getElementById('cn-'+id).value.trim();
  if(!n){toast('Name cannot be empty');return;}
  c.n=n;save();rCL();toast('Category saved!');
}
function delCat(id){
  if(getItems(id).length){toast('Move or delete items first!');return;}
  if(!confirm('Delete this category?'))return;
  DB.cats=DB.cats.filter(c=>c.id!==id);
  save();rCL();toast('Deleted');
}

// ── INIT ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  // restore theme
  if(localStorage.getItem('albasha_theme')==='light'){
    isLight=true;
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent='🌙';
  }

  // double tap logo → admin
  let lastTap=0;
  const logoEl=document.getElementById('logo-tap');
  if(logoEl){
    logoEl.addEventListener('click',()=>{
      const now=Date.now();
      if(now-lastTap<400){ openPin(); }
      lastTap=now;
    });
  }

  buildGrid();
  showCats();
});
</script>
</body>
</html>
